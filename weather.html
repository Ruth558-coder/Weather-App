<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 class="logo">
                <i class="fas fa-cloud-sun"></i>
                Weather App
            </h1>
            <div class="search-container">
                <input type="text" id="cityInput" placeholder="Enter city name..." class="search-input">
                <button id="searchBtn" class="search-btn">
                    <i class="fas fa-search"></i>
                </button>
                <button id="locationBtn" class="location-btn">
                    <i class="fas fa-location-dot"></i>
                </button>
            </div>
        </header>

        <main class="main-content">
            <div id="loading" class="loading hidden">
                <i class="fas fa-spinner fa-spin"></i>
                <p>Loading weather data...</p>
            </div>

            <div id="error" class="error hidden">
                <i class="fas fa-exclamation-triangle"></i>
                <p id="errorMessage">Something went wrong. Please try again.</p>
            </div>

            <div id="weatherContent" class="weather-content hidden">
                <div class="current-weather">
                    <div class="weather-header">
                        <div class="location-info">
                            <h2 id="cityName">--</h2>
                            <p id="country">--</p>
                        </div>
                        <div class="datetime">
                            <p id="currentDate">--</p>
                            <p id="currentTime">--</p>
                        </div>
                    </div>

                    <div class="weather-main">
                        <div class="temperature-section">
                            <div class="temperature">
                                <span id="temperature">--</span>
                                <span class="unit">°C</span>
                            </div>
                            <div class="feels-like">
                                Feels like <span id="feelsLike">--</span>°C
                            </div>
                        </div>
                        <div class="weather-icon-section">
                            <img id="weatherIcon" src="" alt="Weather icon" class="weather-icon">
                            <p id="weatherDescription" class="weather-description">--</p>
                        </div>
                    </div>

                    <div class="weather-details">
                        <div class="detail-item">
                            <i class="fas fa-wind"></i>
                            <div>
                                <p class="detail-label">Wind Speed</p>
                                <p id="windSpeed">-- m/s</p>
                            </div>
                        </div>
                        <div class="detail-item">
                            <i class="fas fa-droplet"></i>
                            <div>
                                <p class="detail-label">Humidity</p>
                                <p id="humidity">--%</p>
                            </div>
                        </div>
                        <div class="detail-item">
                            <i class="fas fa-gauge"></i>
                            <div>
                                <p class="detail-label">Pressure</p>
                                <p id="pressure">-- hPa</p>
                            </div>
                        </div>
                        <div class="detail-item">
                            <i class="fas fa-eye"></i>
                            <div>
                                <p class="detail-label">Visibility</p>
                                <p id="visibility">-- km</p>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="forecast-section">
                    <h3>5-Day Forecast</h3>
                    <div id="forecast" class="forecast-container">
                        <!-- Forecast items will be inserted here -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
